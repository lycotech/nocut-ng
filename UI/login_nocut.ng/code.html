<!-- Login Card -->
<div class="glass-card w-full p-lg rounded-xl shadow-2xl">
<!-- Header -->
<div class="mb-lg">
<h1 class="font-headline-md text-headline-md text-text-primary mb-xs">Welcome back</h1>
<p class="font-body-sm text-body-sm text-text-secondary font-normal">Log in to your NoCut account</p>
</div>
<!-- Form -->
<form class="space-y-md" id="loginForm" onsubmit="return false">
<!-- Email Field (Error State) -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-xs font-normal" for="email">Email or phone</label>
<input class="w-full h-11 px-md bg-input-surface border border-error rounded-lg text-text-primary placeholder:text-text-muted focus:outline-none focus:ring-2 focus:ring-primary-container/30 transition-all font-body-sm font-normal" id="email" placeholder="e.g. john@example.com" type="text"/>
</div>
<!-- Password Field -->
<div class="relative">
<div class="flex justify-between items-center mb-xs">
<label class="block font-label-sm text-label-sm text-on-surface-variant font-normal" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary-container hover:underline font-medium" href="#">Forgot password?</a>
</div>
<div class="relative">
<input class="w-full h-11 pl-md pr-12 bg-input-surface border border-border rounded-lg text-text-primary placeholder:text-text-muted focus:outline-none focus:ring-2 focus:ring-primary-container/30 focus:border-primary-container/50 transition-all font-body-sm font-normal" id="password" placeholder="Enter password" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-text-muted hover:text-text-primary transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[20px]" id="eye-icon">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-11 bg-primary-container text-on-primary font-label-md text-label-md font-bold uppercase rounded-lg hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center" type="submit">
                Log In
            </button>
<!-- Error Message -->
<div class="flex items-center gap-xs justify-center text-error font-body-sm text-body-sm font-normal">
<span class="material-symbols-outlined text-[16px]">error</span>
<span>Incorrect email or password</span>
</div>
<!-- Divider -->
<div class="relative py-xs flex items-center">
<div class="flex-grow border-t border-border"></div>
<span class="flex-shrink mx-md font-label-sm text-label-sm text-text-muted uppercase font-normal">or</span>
<div class="flex-grow border-t border-border"></div>
</div>
<!-- Social OAuth -->
<button class="w-full h-11 bg-transparent border border-border text-text-primary font-label-md text-label-md font-medium rounded-lg hover:bg-surface-variant/50 transition-all flex items-center justify-center gap-sm" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="currentColor"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="currentColor"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="currentColor"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="currentColor"></path>
</svg>
                Continue with Google
            </button>
</form>
</div>
<!-- Footer -->
<p class="mt-lg font-body-sm text-body-sm text-text-secondary font-normal">
        Don't have an account? <a class="text-primary-container font-medium hover:underline" href="#">Sign up</a>
</p>
</main>
<script>
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eye-icon');
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            eyeIcon.innerText = 'visibility_off';
        } else {
            passwordInput.type = 'password';
            eyeIcon.innerText = 'visibility';
        }
    }

    // Simple animation for input focus
    const inputs = document.querySelectorAll('input');
    inputs.forEach(input => {
        input.addEventListener('focus', () => {
            // Using primary container color for the glow effect
            input.parentElement.closest('.glass-card').style.boxShadow = '0 0 30px rgba(16, 185, 129, 0.05)';
        });
        input.addEventListener('blur', () => {
            input.parentElement.closest('.glass-card').style.boxShadow = '';
        });
    });
</script>
</body></html>
